name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthlocker
          POSTGRES_PASSWORD: healthlocker
          POSTGRES_DB: healthlocker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U healthlocker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://healthlocker:healthlocker@localhost:5432/healthlocker_test?schema=public
      DIRECT_URL: postgresql://healthlocker:healthlocker@localhost:5432/healthlocker_test?schema=public
      # CI never touches real infrastructure: no Upstash, no R2, no AI quota.
      AUTH_JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret-01
      # Fixed throwaway key: CI encrypts and decrypts its own seed data only.
      ENCRYPTION_KEY: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      AI_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma generate

      - name: Apply migrations
        run: pnpm db:deploy

      - name: Seed reference and demo data
        run: pnpm db:seed

      # The seed creates no accounts by design, so bootstrap the one the
      # integration suite asserts on. Throwaway credentials, throwaway database.
      - name: Bootstrap a Super Admin
        run: pnpm create-super-admin --username ci.admin --password ci-only-password-not-a-secret

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      # Needs the migrated + seeded database above.
      - run: pnpm test:integration

      - run: pnpm build

      # A route test that only checks "signed out → 307 /login" proves nothing
      # about whether a page renders once you ARE signed in. `pnpm smoke` walks
      # every nav destination for every role with a real session cookie, which is
      # what catches a server→client serialisation bug before a human does.
      - name: Render every authenticated page
        env:
          SMOKE_BASE: http://127.0.0.1:3000
        run: |
          pnpm db:demo --reset
          pnpm start &
          SERVER_PID=$!
          # Poll rather than sleep: the boot time varies with runner load.
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/api/v1/health > /dev/null && break
            sleep 2
          done
          pnpm smoke
          SMOKE_EXIT=$?
          kill $SERVER_PID
          exit $SMOKE_EXIT
